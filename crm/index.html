<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM — Вкусная Доставка</title>
    <script src="/crm/react.min.js"></script>
    <script src="/crm/react-dom.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1a14; color: #e0f0e5; min-height: 100vh; }
        .app { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .glass { background: rgba(30,60,42,0.85); border: 1px solid rgba(100,180,120,0.2); border-radius: 20px; }
        .neo { box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 28px; margin-bottom: 24px; }
        .header h1 { font-size: 20px; font-weight: 700; color: #5cdb7e; }
        .header .refresh { background: rgba(64,192,87,0.2); color: #5cdb7e; border: 1px solid rgba(64,192,87,0.4); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .header .refresh:hover { background: rgba(64,192,87,0.35); }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { padding: 24px; transition: all 0.2s; }
        .stat-card .icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 14px; }
        .stat-card .icon.c1 { background: rgba(64,192,87,0.25); color: #5cdb7e; }
        .stat-card .icon.c2 { background: rgba(100,200,160,0.2); color: #70d4a0; }
        .stat-card h3 { color: #8cc8a0; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .stat-card .value { font-size: 26px; font-weight: 700; }
        .stat-card .value.c1 { color: #5cdb7e; }
        .stat-card .value.c2 { color: #70d4a0; }
        .tabs { display: flex; gap: 6px; margin-bottom: 24px; padding: 6px; border-radius: 16px; background: rgba(30,60,42,0.6); border: 1px solid rgba(100,180,120,0.15); display: inline-flex; flex-wrap: wrap; }
        .tab { padding: 10px 20px; border: none; border-radius: 12px; color: #8cc8a0; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; background: transparent; }
        .tab:hover { background: rgba(64,192,87,0.1); }
        .tab.active { background: rgba(64,192,87,0.25); color: #e0f0e5; }
        .tab .badge { background: rgba(64,192,87,0.3); color: #5cdb7e; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin-left: 6px; font-weight: 600; }
        .panel { border-radius: 20px; overflow: visible; }
        .panel-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(100,180,120,0.12); }
        .panel-header h2 { font-size: 16px; font-weight: 700; color: #e0f0e5; }
        .btn { padding: 8px 16px; border: none; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { filter: brightness(1.2); }
        .btn-success { background: rgba(64,192,87,0.3); color: #5cdb7e; border: 1px solid rgba(64,192,87,0.5); }
        .btn-danger { background: rgba(220,60,60,0.25); color: #f87171; border: 1px solid rgba(220,60,60,0.4); }
        .btn-primary { background: rgba(56,152,200,0.3); color: #60c0e8; border: 1px solid rgba(56,152,200,0.4); }
        .btn-ghost { background: rgba(100,180,120,0.1); color: #8cc8a0; border: 1px solid rgba(100,180,120,0.2); }
        .order-item { padding: 18px 24px; border-bottom: 1px solid rgba(100,180,120,0.08); display: flex; justify-content: space-between; align-items: center; }
        .order-item:last-child { border-bottom: none; }
        .order-id { font-weight: 700; color: #5cdb7e; font-size: 15px; }
        .order-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .badge-new { background: rgba(64,192,87,0.3); color: #5cdb7e; }
        .badge-confirmed { background: rgba(56,180,130,0.3); color: #50d0a0; }
        .badge-preparing { background: rgba(200,180,60,0.25); color: #e0d060; }
        .badge-ready { background: rgba(100,200,160,0.25); color: #70d4a0; }
        .badge-delivering { background: rgba(56,152,200,0.25); color: #60c0e8; }
        .badge-delivered { background: rgba(64,192,87,0.35); color: #5cdb7e; }
        .badge-cancelled { background: rgba(220,60,60,0.25); color: #f87171; }
        .order-meta { color: #8cc8a0; font-size: 12px; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
        .order-meta span { display: inline-flex; align-items: center; gap: 4px; }
        .order-price { font-size: 20px; font-weight: 700; color: #e0f0e5; }
        .actions { display: flex; gap: 6px; margin-top: 8px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; padding: 20px 24px; }
        .menu-card { padding: 20px; border-radius: 16px; transition: all 0.2s; }
        .menu-card h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #e0f0e5; }
        .menu-card .desc { color: #8cc8a0; font-size: 13px; margin: 8px 0 12px; }
        .menu-card .price { font-size: 22px; font-weight: 700; color: #5cdb7e; }
        .menu-card .card-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(100,180,120,0.12); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { padding: 28px; width: 460px; max-width: 90vw; }
        .modal h2 { margin-bottom: 20px; font-size: 18px; font-weight: 700; color: #e0f0e5; }
        .modal input, .modal select { width: 100%; padding: 12px 14px; background: rgba(15,26,20,0.8); border: 1px solid rgba(100,180,120,0.25); border-radius: 10px; color: #e0f0e5; font-size: 14px; margin-bottom: 12px; font-family: inherit; outline: none; }
        .modal input:focus, .modal select:focus { border-color: rgba(64,192,87,0.6); }
        .modal select option { background: #1a2e22; color: #e0f0e5; }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .order-detail-items { margin: 16px 0; }
        .order-detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(100,180,120,0.08); font-size: 14px; }
        .order-detail-row:last-child { border-bottom: none; }
        .order-detail-qty { color: #70d4a0; margin: 0 16px; }
        .order-detail-total { display: flex; justify-content: space-between; padding: 14px 0; margin-top: 8px; border-top: 2px solid rgba(64,192,87,0.4); font-size: 18px; font-weight: 700; }
        .order-detail-label { color: #70d4a0; font-size: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .order-detail-value { margin-bottom: 14px; font-size: 14px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 12px 0; }
        .empty { padding: 60px; text-align: center; color: #8cc8a0; font-size: 14px; opacity: 0.6; }
        .zone-item { padding: 16px 24px; border-bottom: 1px solid rgba(100,180,120,0.08); }
        .zone-item:last-child { border-bottom: none; }
        .zone-top { display: flex; justify-content: space-between; align-items: center; }
        .zone-info { flex: 1; min-width: 0; }
        .zone-name { font-weight: 700; font-size: 15px; color: #e0f0e5; }
        .zone-tag { display: inline-block; margin-left: 8px; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
        .zone-tag.on { background: rgba(64,192,87,0.25); color: #5cdb7e; }
        .zone-tag.off { background: rgba(220,60,60,0.25); color: #f87171; }
        .zone-meta { margin-top: 6px; font-size: 13px; color: #8cc8a0; display: flex; gap: 16px; flex-wrap: wrap; }
        .zone-meta span { display: inline-flex; align-items: center; gap: 4px; }
        .zone-keywords { margin-top: 6px; font-size: 12px; color: #6aad85; word-break: break-word; }
        .zone-actions { display: flex; gap: 8px; flex-shrink: 0; margin-left: 16px; }
        .zone-actions .btn { padding: 8px 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="/crm/app.js"></script>
</body>
</html>
