<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM — Вкусная Доставка</title>
    <script src="/crm/react.min.js"></script>
    <script src="/crm/react-dom.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(160deg, #1B4332 0%, #2D6A4F 40%, #40916C 100%); color: #D8F3DC; min-height: 100vh; }
        .app { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .glass { background: rgba(119,200,148,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(119,200,148,0.15); border-radius: 20px; }
        .neo { box-shadow: 8px 8px 16px rgba(0,0,0,0.5), -4px -4px 12px rgba(119,200,148,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 28px; margin-bottom: 24px; }
        .header h1 { font-size: 20px; font-weight: 600; background: linear-gradient(135deg, #D8F3DC, #40C057); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .refresh { background: rgba(64,192,87,0.15); color: #40C057; border: 1px solid rgba(64,192,87,0.25); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { padding: 24px; transition: all 0.3s; }
        .stat-card .icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 14px; }
        .stat-card .icon.c1 { background: rgba(64,192,87,0.2); color: #40C057; }
        .stat-card .icon.c2 { background: rgba(119,200,148,0.15); color: #77C894; }
        .stat-card h3 { color: #95D5B2; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; opacity: 0.8; }
        .stat-card .value { font-size: 26px; font-weight: 700; }
        .stat-card .value.c1 { color: #40C057; }
        .stat-card .value.c2 { color: #77C894; }
        .tabs { display: flex; gap: 6px; margin-bottom: 24px; padding: 6px; border-radius: 16px; background: rgba(119,200,148,0.06); border: 1px solid rgba(119,200,148,0.1); display: inline-flex; flex-wrap: wrap; }
        .tab { padding: 10px 20px; border: none; border-radius: 12px; color: #95D5B2; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; background: transparent; opacity: 0.7; }
        .tab.active { background: rgba(64,192,87,0.2); color: #D8F3DC; opacity: 1; }
        .tab .badge { background: rgba(64,192,87,0.25); color: #40C057; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin-left: 6px; }
        .panel { border-radius: 20px; overflow: hidden; }
        .panel-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(119,200,148,0.06); }
        .panel-header h2 { font-size: 16px; font-weight: 600; }
        .btn { padding: 8px 16px; border: none; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-success { background: rgba(64,192,87,0.2); color: #40C057; border: 1px solid rgba(64,192,87,0.3); }
        .btn-danger { background: rgba(180,60,60,0.2); color: #e88; border: 1px solid rgba(180,60,60,0.2); }
        .btn-primary { background: rgba(45,106,79,0.5); color: #52B788; border: 1px solid rgba(82,183,136,0.3); }
        .btn-ghost { background: transparent; color: #95D5B2; border: 1px solid rgba(119,200,148,0.1); }
        .order-item { padding: 18px 24px; border-bottom: 1px solid rgba(119,200,148,0.05); display: flex; justify-content: space-between; align-items: center; }
        .order-item:last-child { border-bottom: none; }
        .order-id { font-weight: 700; color: #40C057; font-size: 15px; }
        .order-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .badge-new { background: rgba(64,192,87,0.2); color: #40C057; }
        .badge-confirmed { background: rgba(82,183,136,0.2); color: #52B788; }
        .badge-preparing { background: rgba(119,200,148,0.15); color: #77C894; }
        .badge-ready { background: rgba(149,213,178,0.15); color: #95D5B2; }
        .badge-delivering { background: rgba(82,183,136,0.15); color: #52B788; }
        .badge-delivered { background: rgba(64,192,87,0.25); color: #40C057; }
        .badge-cancelled { background: rgba(180,60,60,0.2); color: #e88; }
        .order-meta { color: #95D5B2; font-size: 12px; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; opacity: 0.8; }
        .order-meta span { display: inline-flex; align-items: center; gap: 4px; }
        .order-price { font-size: 20px; font-weight: 700; color: #D8F3DC; }
        .actions { display: flex; gap: 6px; margin-top: 8px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; padding: 20px 24px; }
        .menu-card { padding: 20px; border-radius: 16px; transition: all 0.3s; }
        .menu-card h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #D8F3DC; }
        .menu-card .desc { color: #95D5B2; font-size: 13px; margin: 8px 0 12px; opacity: 0.8; }
        .menu-card .price { font-size: 22px; font-weight: 700; color: #40C057; }
        .menu-card .card-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(119,200,148,0.08); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(13,40,24,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { padding: 28px; width: 460px; max-width: 90vw; }
        .modal h2 { margin-bottom: 20px; font-size: 18px; font-weight: 600; }
        .modal input, .modal select { width: 100%; padding: 12px 14px; background: rgba(119,200,148,0.08); border: 1px solid rgba(119,200,148,0.12); border-radius: 10px; color: #D8F3DC; font-size: 14px; margin-bottom: 12px; font-family: inherit; outline: none; }
        .modal select option { background: #1B4332; color: #D8F3DC; }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .order-detail-items { margin: 16px 0; }
        .order-detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(119,200,148,0.05); font-size: 14px; }
        .order-detail-row:last-child { border-bottom: none; }
        .order-detail-qty { color: #52B788; margin: 0 16px; }
        .order-detail-total { display: flex; justify-content: space-between; padding: 14px 0; margin-top: 8px; border-top: 2px solid rgba(64,192,87,0.3); font-size: 18px; font-weight: 700; }
        .order-detail-label { color: #52B788; font-size: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }
        .order-detail-value { margin-bottom: 14px; font-size: 14px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 12px 0; }
        .empty { padding: 60px; text-align: center; color: #95D5B2; font-size: 14px; opacity: 0.5; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="/crm/app.js"></script>
</body>
</html>
